name: Keep Render Backend Awake (heartbeat)

on:
  schedule:
    # This runs every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send GET request
        run: curl https://cloudfs.onrender.com/ping
